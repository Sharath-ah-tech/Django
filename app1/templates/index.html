{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'app1/style.css' %}">
</head>

<body>

<div class="container">
    <form method="POST" class="login-box">
        {% csrf_token %}

        <h2>Login</h2>

        <input type="text" name="f" placeholder="Username" required>
        <input type="email" name="e" placeholder="Email" required>
        <input type="password" name="p" placeholder="Password" required>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
